server:
  port: 8090

spring:
  application:
    name: maintenance-manual-service
  datasource:
    url: jdbc:mysql://localhost:3306/mro_manual?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 4
    elasticsearch:
      repositories:
        enabled: true
  elasticsearch:
    uris: http://localhost:9200
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  threads:
    virtual:
      enabled: true

dubbo:
  application:
    name: maintenance-manual-service
  registry:
    address: nacos://localhost:8848
  protocol:
    name: dubbo
    port: 20888
  consumer:
    check: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: mro-manual

logging:
  level:
    com.mro.manual: DEBUG
