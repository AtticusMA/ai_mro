server:
  port: 8089

spring:
  application:
    name: fault-diagnosis-service
  datasource:
    url: jdbc:mysql://localhost:3306/mro_tshoot?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 4
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: fault-diagnosis
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  threads:
    virtual:
      enabled: true

dubbo:
  application:
    name: fault-diagnosis-service
  registry:
    address: nacos://localhost:8848
  protocol:
    name: dubbo
    port: 20885
  consumer:
    check: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: mro-tshoot

# External AI service endpoints (vLLM + Embedding)
ai:
  llm:
    url: http://localhost:8000/v1/chat/completions
    model: qwen2.5-7b-instruct
  embedding:
    url: http://localhost:8001/v1/embeddings
    model: bge-large-zh-v1.5
    dimension: 1024

logging:
  level:
    com.mro.tshoot: DEBUG
