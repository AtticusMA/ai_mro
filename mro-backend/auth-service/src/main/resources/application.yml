server:
  port: 8082

spring:
  application:
    name: auth-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/mro_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

dubbo:
  application:
    name: auth-service
  protocol:
    name: dubbo
    port: 20880
  registry:
    address: nacos://${NACOS_ADDR:127.0.0.1:8848}

mro:
  jwt:
    secret: ${JWT_SECRET:mro-backend-jwt-secret-key-must-be-at-least-256bits}
    access-token-expire: 7200     # 2h，单位秒
    refresh-token-expire: 604800  # 7d，单位秒

logging:
  level:
    com.mro: DEBUG
